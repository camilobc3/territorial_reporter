<div class="chat-card">

  <div class="messages">

    <div
      class="message"
      *ngFor="let message of messages"
      [ngClass]="{
        'user-message': message.role === 'user',
        'bot-message': message.role === 'bot'
      }"
    >
      <div class="bubble">
        {{ message.text }}
      </div>
    </div>

    <div class="message bot-message" *ngIf="loading">
      <div class="bubble">
        Generando reporte...
      </div>
    </div>

    <div class="error" *ngIf="error">
      {{ error }}
    </div>

  </div>

  <form class="input-area" (ngSubmit)="sendQuery()">

    <input
      type="text"
      name="query"
      [(ngModel)]="query"
      placeholder="Escribe tu consulta en lenguaje natural..."
      [disabled]="loading"
    />

    <button type="submit" [disabled]="loading">
      Enviar
    </button>

  </form>

</div>
