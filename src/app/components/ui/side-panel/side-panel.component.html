@if (sidePanelUtils.isOpen) {
    <div class="w-96 shrink-0 bg-white rounded-2xl shadow-lg border border-gray-200 p-5 self-start">
      <div class="flex justify-between items-center mb-4">
        <h3 class="text-lg font-semibold text-gray-900">{{ sidePanelUtils.title }}</h3>
        <button (click)="sidePanelUtils.close()" class="text-gray-400 hover:text-gray-600">
          <span class="material-icons">close</span>
        </button>
      </div>
      <ng-content></ng-content>
    </div>
  }
