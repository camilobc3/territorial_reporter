<mat-card class="cardWithShadow theme-card">
  <div class="p-6">
    <mat-card-title class="mb-0">
      {{ isEditMode ? 'Editar departamento' : 'Crear departamento' }}
    </mat-card-title>
  </div>

  <mat-card-content class="border-t border-border">
    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="grid grid-cols-12 gap-x-6">

        <div class="col-span-12 lg:col-span-6">
          <mat-label class="font-semibold mb-2 block">Nombre</mat-label>
          <mat-form-field appearance="outline" class="w-full">
            <input matInput formControlName="name" placeholder="Nombre del departamento" />
            <mat-error *ngIf="f['name'].invalid && (f['name'].dirty || f['name'].touched)">
              El nombre es obligatorio.
            </mat-error>
          </mat-form-field>
        </div>

        <div class="col-span-12 lg:col-span-6">
          <mat-label class="font-semibold mb-2 block">Código DANE</mat-label>
          <mat-form-field appearance="outline" class="w-full">
            <input matInput formControlName="dane_code" placeholder="Ej: 17" />
          </mat-form-field>
        </div>

      </div>

      <div class="mt-3 flex gap-2">
        <button mat-flat-button color="primary" type="submit"
          [disabled]="form.invalid" class="w-36">
          {{ isEditMode ? 'Actualizar' : 'Crear' }}
        </button>
        <button mat-flat-button color="warn" type="button"
          (click)="onCancel()" class="w-36">
          Cancelar
        </button>
      </div>
    </form>
  </mat-card-content>
</mat-card>
