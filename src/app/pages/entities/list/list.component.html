<!-- list.component.html -->
<div class="relative">

  <app-rich-table
    title="Entidades registradas"
    subtitle="Consulta, edita o elimina las entidades del sistema."
    createLabel="Nueva entidad"
    searchPlaceholder="Buscar por nombre..."
    searchKey="name"
    [columns]="columns"
    [actions]="actions"
    [data]="entities"
    [loading]="loading"
    [page]="page"
    [pageSize]="pageSize"
    [total]="total"
    [totalPages]="totalPages"
    (create)="openCreate()"
    (action)="onAction($event)"
    (pageChange)="goToPage($event)">
  </app-rich-table>

  <!-- Overlay -->
  @if (panelOpen) {
    <div class="fixed inset-0 bg-black/30 z-40" (click)="closePanel()"></div>
  }

  <!-- Panel lateral deslizante -->
  <div
    class="fixed top-0 right-0 h-full w-full sm:w-[440px] bg-white shadow-2xl z-50 flex flex-col
           transition-transform duration-300 ease-in-out border-l border-border"
    [class.translate-x-0]="panelOpen"
    [class.translate-x-full]="!panelOpen">

    @if (panelOpen) {
      <app-form
        #entityFormRef
        [entity]="selectedEntity ?? undefined"
        (formSubmit)="onFormSubmit($event)"
        (cancel)="closePanel()">
      </app-form>
    }
  </div>

</div>
