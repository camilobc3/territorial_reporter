<div class="flex gap-4 h-full">

  <!-- ── Columna izquierda: selector de barrios ─────────────────────────── -->
  <app-neighborhood-selector
    (neighborhoodSelected)="onNeighborhoodSelected($event)">
  </app-neighborhood-selector>

  <!-- ── Columna central: mapa ─────────────────────────────────────────── -->
  <div class="flex-1 min-w-0 flex flex-col gap-3">

    @if (!selectedNeighborhood) {
      <mat-card class="cardWithShadow flex-1">
        <mat-card-content>
          <div class="flex flex-col items-center justify-center h-full py-16 gap-3 text-gray-400">
            <mat-icon style="font-size:48px;width:48px;height:48px;">map</mat-icon>
            <p class="text-base font-medium">Selecciona un barrio</p>
            <p class="text-sm">El mapa de demarcación aparecerá aquí.</p>
          </div>
        </mat-card-content>
      </mat-card>
    }

    @if (selectedNeighborhood) {
      <mat-card class="cardWithShadow">
        <mat-card-content class="flex items-center gap-2 py-2">
          <mat-icon class="text-primary">location_on</mat-icon>
          <span class="font-semibold text-sm">{{ selectedNeighborhood.name }}</span>
          @if (polygonState.hasChanges) {
            <span class="text-xs text-warning ml-2">● Cambios sin guardar</span>
          }
        </mat-card-content>
      </mat-card>

      <div
        leaflet
        class="flex-1 rounded-lg overflow-hidden"
        style="height: 520px;"
        [leafletOptions]="mapOptions"
        (leafletMapReady)="onMapReady($event)">
      </div>
    }

  </div>

  <!-- ── Columna derecha: herramientas ─────────────────────────────────── -->
  <app-map-tools-panel
    [selectedNeighborhood]="selectedNeighborhood"
    [saving]="saving"
    (startDraw)="onStartDraw()"
    (stopDraw)="onStopDraw()"
    (startEdit)="onStartEdit()"
    (confirmEdit)="onConfirmEdit()"
    (clear)="onClear()"
    (cancel)="onCancel()"
    (save)="onSave()">
  </app-map-tools-panel>

</div>
