<div class="flex gap-4">

  <!-- Tabla jerárquica -->
  <div class="flex-1 min-w-0">
    <app-hierarchical-table
      title="Categorías y Subcategorías"
      subtitle="Administra las categorías que clasifican las anotaciones del sistema."
      createLabel="Nueva categoría"
      searchPlaceholder="Buscar categoría..."
      emptyMessage="No hay categorías registradas."
      idKey="id_category"
      parentKey="id_parent_category"
      nameKey="name"
      [columns]="columns"
      [actions]="actions"
      [data]="categories"
      [loading]="loading"
      [page]="page"
      [pageSize]="pageSize"
      [total]="total"
      [totalPages]="totalPages"
      (create)="panel.open('Nueva categoría', 'create')"
      (action)="onTableAction($event)">
    </app-hierarchical-table>
  </div>

  <!-- Panel lateral -->
  <app-side-panel>
    <app-category-form
      [category]="editingCategory"
      (formSubmit)="onFormSubmit($event)"
      (cancelled)="panel.close()">
    </app-category-form>
  </app-side-panel>

</div>
