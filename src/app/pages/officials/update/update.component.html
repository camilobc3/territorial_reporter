@if (isLoading) {
  <div class="p-6 text-center">
    <p>Cargando funcionario...</p>
  </div>
} @else if (errorMessage) {
  <div class="p-6">
    <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded">
      {{ errorMessage }}
    </div>
  </div>
} @else if (official) {
  <app-components
    [official]="official"
    [isSubmitting]="isSubmitting"
    (formSubmit)="onUpdate($event)"
    (cancel)="onCancel()">
  </app-components>
} @else {
  <p class="p-6">No se encontró el funcionario.</p>
}
